<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: #f8fafc; color: #334155;
    -webkit-app-region: drag;
  }
  .container { text-align: center; }
  h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem; }
  p { font-size: 0.875rem; color: #64748b; }
  .spinner {
    width: 32px; height: 32px; margin: 1rem auto;
    border: 3px solid #e2e8f0; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1 id="title">Anwendung wird gestartet...</h1>
  <div class="spinner"></div>
  <p>Bitte warten</p>
</div>
</body>
</html>
