<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    height: 100vh; background: #f8fafc; color: #334155;
  }
  .container { text-align: center; max-width: 500px; padding: 2rem; }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #1e293b; }
  .subtitle { font-size: 1rem; color: #64748b; margin-bottom: 2rem; }
  .info { font-size: 0.875rem; color: #475569; line-height: 1.6; margin-bottom: 2rem; text-align: left; }
  .info li { margin-bottom: 0.5rem; }
  .info ul { list-style: none; padding: 0; }
  .info li::before { content: "✓ "; color: #22c55e; font-weight: bold; }
  .btn {
    padding: 0.75rem 2rem; background: #3b82f6; color: white;
    border: none; border-radius: 0.5rem; cursor: pointer;
    font-size: 1rem; font-weight: 500;
  }
  .btn:hover { background: #2563eb; }
  .footer { font-size: 0.75rem; color: #94a3b8; margin-top: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1 id="title">Willkommen</h1>
  <p class="subtitle" id="subtitle">Vielen Dank fuer die Installation.</p>
  <div class="info">
    <ul>
      <li>Alle Daten bleiben lokal auf Ihrem Computer</li>
      <li>Keine Registrierung oder Internetverbindung noetig</li>
      <li>Automatische Backups schuetzen Ihre Daten</li>
      <li>Open Source (GPL-3.0) — kostenlos nutzbar</li>
    </ul>
  </div>
  <button class="btn" id="startBtn" onclick="start()">Loslegen</button>
  <p class="footer">Detmers Publishing &amp; Media — detmers-publish.de</p>
</div>
<script>
  function start() {
    if (window.electronAPI && window.electronAPI.app) {
      window.electronAPI.app.rendererReady();
    }
    // Signal to main process that welcome is done
    if (window.electronAPI && window.electronAPI.firstRun) {
      window.electronAPI.firstRun.complete();
    }
  }
</script>
</body>
</html>
