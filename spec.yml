schema_version: 1
product_id: "nachweis-lokal"
name: "Nachweis Lokal"
tagline: "Pruefprotokolle dokumentieren, Nachweise erzeugen, Historie nachvollziehen"
version: "0.5.0"
license: "GPL-3.0-only"
type: "app"
tech_stack: "electron-svelte"
bundles: ["B-08-nachweis"]
platforms: ["linux", "windows", "macos"]

description:
  short: "Desktop-App fuer Pruefprotokolle, Checklisten und Nachweise"
  long: |
    Nachweis Lokal organisiert Ihre wiederkehrenden Pruefungen —
    ob Sie digital arbeiten oder Formulare ausdrucken und im Ordner abheften.
    Checklisten verwalten, Fristen im Blick behalten, Formulare drucken.
    Keine Cloud, keine monatlichen Kosten, alle Daten lokal auf Ihrem Rechner.
  benefits:
    - "Alle Daten lokal — keine Cloud"
    - "Pruefvorlagen mit beliebig vielen Pruefpunkten"
    - "Interaktive Pruefungsdurchfuehrung (OK / Maengel / N/A)"
    - "Objekt-/Gegenstandsverwaltung mit Pruefhistorie"
    - "PDF-Pruefprotokolle und Maengelberichte"
    - "Faelligkeits-Dashboard mit Ampellogik"
    - "CSV-Import/Export fuer Vorlagen und Pruefungen"
    - "Druckbare Leerformulare fuer den Einsatz vor Ort"
    - "Aenderungshistorie fuer eigene Nachvollziehbarkeit"
    - "Laeuft auf Windows und Linux"
  target_audience: "Kleine Organisationen, Vereine, Dienstleister mit Dokumentationspflichten"

pricing:
  model: "servicepaket"
  price_cents: 3900
  interval: "jaehrlich"
  includes:
    - "Fertige Installer (Windows, Linux, macOS)"
    - "Zugang zum Download-Portal mit stabilen Releases"
    - "Automatische Update-Benachrichtigung"
    - "Branchenspezifische Vorlagen-Pakete"
    - "Feature-Request mit Stimmrecht"
    - "Technische Hilfe bei Problemen (Ticket, 48h)"

features:
  - id: "template-crud"
    name: "Pruefvorlagen verwalten"
    description: "Vorlagen mit beliebig vielen Pruefpunkten anlegen, bearbeiten, deaktivieren"
    status: "done"
    since: "0.1.0"
  - id: "template-items"
    name: "Pruefpunkte"
    description: "Pruefpunkte je Vorlage mit Reihenfolge, Hinweisen und Pflicht-Kennzeichnung"
    status: "done"
    since: "0.1.0"
  - id: "object-crud"
    name: "Objektverwaltung"
    description: "Geraete, Raeume, Anlagen mit Standort, Kategorie und Kennung verwalten"
    status: "done"
    since: "0.1.0"
  - id: "object-history"
    name: "Pruefhistorie je Objekt"
    description: "Chronologische Uebersicht aller Pruefungen pro Objekt"
    status: "done"
    since: "0.1.0"
  - id: "inspection-crud"
    name: "Pruefungen verwalten"
    description: "Pruefungen anlegen, einer Vorlage und optional einem Objekt zuordnen"
    status: "done"
    since: "0.1.0"
  - id: "inspection-execute"
    name: "Pruefung durchfuehren"
    description: "Interaktive Checkliste: OK, Maengel oder N/A je Pruefpunkt, Zwischenspeichern moeglich"
    status: "done"
    since: "0.1.0"
  - id: "inspection-status"
    name: "Status-Workflow"
    description: "Offen → Bestanden/Bemaengelt/Abgebrochen mit automatischer Erkennung"
    status: "done"
    since: "0.1.0"
  - id: "dashboard"
    name: "Dashboard"
    description: "Statistiken (gesamt, offen, bestanden, bemaengelt) und Faelligkeitsuebersicht"
    status: "done"
    since: "0.1.0"
  - id: "due-tracking"
    name: "Fristen-Tracker"
    description: "Automatische Faelligkeitsberechnung mit Ampellogik (OK, bald faellig, ueberfaellig)"
    status: "done"
    since: "0.1.0"
  - id: "pdf-protocol"
    name: "PDF-Pruefprotokoll"
    description: "Einzelprotokoll mit Briefkopf, Metadaten und allen Ergebnissen"
    status: "done"
    since: "0.1.0"
  - id: "pdf-deficiency"
    name: "PDF-Maengelbericht"
    description: "Separates Dokument nur fuer beanstandete Pruefpunkte"
    status: "done"
    since: "0.1.0"
  - id: "pdf-list"
    name: "PDF-Pruefungsliste"
    description: "Gesamtliste aller Pruefungen als druckfertige PDF"
    status: "done"
    since: "0.1.0"
  - id: "csv-export"
    name: "CSV-Export"
    description: "Pruefungen als CSV exportieren (Semikolon, UTF-8 BOM, Excel-kompatibel)"
    status: "done"
    since: "0.1.0"
  - id: "csv-import"
    name: "CSV-Import Vorlagen"
    description: "Vorlagen aus Excel/CSV importieren inkl. Pruefpunkte"
    status: "done"
    since: "0.1.0"
  - id: "event-log"
    name: "Event-Log"
    description: "Lueckenloses Aenderungsprotokoll mit HMAC-SHA256 Hash-Kette"
    status: "done"
    since: "0.1.0"
  - id: "integrity-check"
    name: "Integritaetspruefung"
    description: "Sichtbare Hash-Ketten-Verifikation im UI mit Ergebnis und Fehlerdetails"
    status: "done"
    since: "0.1.0"
  - id: "org-profile"
    name: "Organisationsprofil"
    description: "Name, Adresse und Verantwortliche fuer Briefkopf auf PDFs"
    status: "done"
    since: "0.1.0"
  - id: "license-section"
    name: "Lizenz-Verwaltung"
    description: "Support-Key eingeben, Status pruefen, entfernen"
    status: "done"
    since: "0.1.0"
  - id: "probe-limit"
    name: "Probe-Limit"
    description: "Maximal 10 aktive Vorlagen ohne Lizenzschluessel"
    status: "done"
    since: "0.1.0"
  - id: "support-integration"
    name: "Support-Integration"
    description: "Supportvertrag verwalten, Tickets einreichen, Diagnose-Bundle"
    status: "done"
    since: "0.1.0"
  - id: "feature-request"
    name: "Feature-Wuensche"
    description: "Feature-Requests direkt aus der App einreichen"
    status: "done"
    since: "0.1.0"
  - id: "template-library"
    name: "Vorlagen-Bibliothek"
    description: "5 fertige Pruefvorlagen (Brandschutz, Elektro, Spielgeraete, Leitern, Erste-Hilfe) zum direkten Uebernehmen"
    status: "done"
    since: "0.2.0"
  - id: "recurring-inspections"
    name: "Wiederkehrende Pruefungen"
    description: "Automatische Folgepruefung bei Abschluss, basierend auf Vorlagen-Intervall"
    status: "done"
    since: "0.2.0"
  - id: "photo-attachments"
    name: "Foto-Anhaenge"
    description: "Fotos pro Pruefpunkt aufnehmen, als Thumbnails anzeigen und im Protokoll einbinden"
    status: "done"
    since: "0.2.0"
  - id: "defect-tracking"
    name: "Maengeltracking"
    description: "Automatische Defekt-Erstellung bei bemaengelten Pruefungen, Status-Workflow (offen/behoben/verifiziert), Nachpruefung"
    status: "done"
    since: "0.2.0"
  - id: "extended-library"
    name: "Erweiterte Vorlagen-Bibliothek"
    description: "15 fertige Pruefvorlagen (u.a. Regalpruefung, UVV Fahrzeug, PSA, Hygiene, Gefaehrdungsbeurteilung, Serverraum, Aufzug, Legionellen)"
    status: "done"
    since: "0.3.0"
  - id: "batch-pdf"
    name: "Sammel-PDF"
    description: "Mehrere Pruefprotokolle in einem kombinierten PDF-Dokument mit Seitenumbruechen"
    status: "done"
    since: "0.3.0"
  - id: "photos-in-pdf"
    name: "Fotos in PDF"
    description: "Foto-Anhaenge werden direkt im PDF-Pruefprotokoll eingebettet"
    status: "done"
    since: "0.3.0"
  - id: "template-duplicate"
    name: "Vorlagen duplizieren"
    description: "Bestehende Vorlage als Kopie anlegen und anpassen"
    status: "done"
    since: "0.3.0"
  - id: "reminders"
    name: "Erinnerungen"
    description: "Dashboard zeigt prominente Warnbanner fuer ueberfaellige und bald faellige Pruefungen"
    status: "done"
    since: "0.3.0"
  - id: "inspector-management"
    name: "Prueferverwaltung"
    description: "Bekannte Pruefer mit Rolle und Qualifikation verwalten, Autovervollstaendigung bei neuer Pruefung"
    status: "done"
    since: "0.3.0"
  - id: "qr-code"
    name: "QR-Code auf PDF"
    description: "Pruefprotokoll-PDFs enthalten QR-Code mit Pruefungsreferenz zur schnellen Zuordnung"
    status: "done"
    since: "0.3.0"

faq:
  - question: "Brauche ich den Servicepaket-Key, um die Software zu nutzen?"
    answer: "Nein. Die Software ist Open Source (GPL 3.0) und funktioniert komplett ohne Key. Das Servicepaket bietet Ihnen Bequemlichkeit: fertige Installer, Updates, Vorlagen-Pakete und bei echten Problemen technische Hilfe."
  - question: "Was enthaelt das Servicepaket genau?"
    answer: "Fertige Installationsdateien, Zugang zum Download-Portal, Update-Benachrichtigungen, branchenspezifische Vorlagen-Pakete und ein Ticketsystem fuer technische Probleme. Kein Telefon-Support, keine Schulung, keine individuelle Einrichtung."
  - question: "Wo werden meine Daten gespeichert?"
    answer: "Lokal auf Ihrem Computer in einer SQLite-Datenbank. Keine Cloud, kein Tracking, kein Account."
  - question: "Kann ich die Formulare auch ausdrucken und handschriftlich ausfuellen?"
    answer: "Ja. Sie koennen jede Checkliste als Leerformular mit Checkboxen ausdrucken, vor Ort mit Stift ausfuellen und im Ordner abheften. Die App erinnert Sie trotzdem an den naechsten Prueftermin."
  - question: "Fuer welche Pruefungen eignet sich das Tool?"
    answer: "Fuer alle wiederkehrenden Pruefungen: Geraetepruefungen, Sicherheitsunterweisungen, Wartungsprotokolle, Spielplatzkontrollen, Brandschutz-Checks und aehnliche Dokumentationspflichten."
  - question: "Gibt es Telefon-Support?"
    answer: "Nein. Die Software ist so gebaut, dass Probleme ueber Selbstdiagnose, Fehlermeldungen und die eingebaute Integritaetspruefung geloest werden. Bei echten Blockern hilft das Ticketsystem (Antwort innerhalb 48h)."

installation:
  prerequisites:
    - "Windows 10+ oder Linux (Ubuntu 22.04+)"
    - "100 MB freier Festplattenspeicher"
  steps:
    - "Laden Sie die aktuelle Version herunter"
    - "Fuehren Sie die Installationsdatei aus"
    - "Starten Sie die Anwendung — keine Konfiguration noetig"
  notes: "Die App speichert Daten im Home-Verzeichnis."

architecture:
  frontend: "Svelte 5 SPA in Electron Renderer"
  backend: "Electron Main Process (@codefabrik/electron-platform)"
  database: "SQLite via better-sqlite3 (Electron IPC)"
  shared_lib: "@codefabrik/app-shared, @codefabrik/ui-shared"
